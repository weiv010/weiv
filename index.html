<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WEIV</title>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --blue: #1A5FD4;
      --white: #ffffff;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #ar-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #ar-container canvas,
    #ar-container video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    #ui.hidden { opacity: 0; pointer-events: none; }

    #header {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 52px 20px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, transparent 100%);
      pointer-events: auto;
    }

    #logo-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      overflow: hidden;
      background: var(--blue);
      display: flex; align-items: center; justify-content: center;
    }
    #logo-icon img { width: 26px; height: 26px; object-fit: contain; }

    #logo-text {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--white);
    }

    #info-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      color: var(--white);
      font-size: 15px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      background: transparent;
      pointer-events: auto;
    }

    #bottom-controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 20px 20px 44px;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 100%);
      pointer-events: auto;
    }

    #light-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 280px;
    }

    .sun-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }

    #light-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.25);
      outline: none;
    }
    #light-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--white);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      cursor: pointer;
    }

    #aux-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .aux-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .aux-btn:active { transform: scale(0.93); }
    .aux-btn.active { background: rgba(255,255,255,0.28); }
    .aux-btn svg { width: 22px; height: 22px; }

    #mode-toggle {
      width: 120px; height: 52px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(255,255,255,0.22);
      display: flex;
      align-items: center;
      padding: 4px;
      cursor: pointer;
      position: relative;
    }

    #toggle-bg {
      position: absolute;
      width: 46px; height: 44px;
      border-radius: 50%;
      background: var(--blue);
      transition: left 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      left: 4px;
      box-shadow: 0 4px 16px rgba(26,95,212,0.5);
    }
    #mode-toggle.shape-active #toggle-bg {
      left: calc(100% - 50px);
    }

    .toggle-icon {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
      flex-shrink: 0;
      transition: opacity 0.3s;
    }
    .toggle-icon svg { width: 26px; height: 26px; }

    #icon-default { opacity: 1; }
    #icon-shape   { opacity: 0.45; }
    #mode-toggle.shape-active #icon-default { opacity: 0.45; }
    #mode-toggle.shape-active #icon-shape   { opacity: 1; }

    #hint {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 9;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    #hint.hidden { opacity: 0; }

    .hint-ring {
      width: 140px; height: 140px;
      border-radius: 50%;
      border: 2.5px dashed rgba(255,255,255,0.5);
      animation: spin 6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hint-text {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.05em;
      text-align: center;
    }

    #bw-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 8;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #bw-overlay.active {
      opacity: 1;
      background: rgba(128,128,128,1);
      mix-blend-mode: color;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #0a0f1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
      transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .loading-logo {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 0.18em;
      color: var(--white);
    }
    .loading-logo span { color: var(--blue); }

    .loading-bar-wrap {
      width: 160px; height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      overflow: hidden;
    }
    .loading-bar {
      height: 100%;
      background: var(--blue);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .loading-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
    }

    #start-btn {
      margin-top: 8px;
      padding: 14px 36px;
      border-radius: 999px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      display: none;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">W<span>E</span>IV</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
  <div class="loading-sub" id="loading-sub">초기화 중...</div>
  <button id="start-btn">카메라 시작</button>
</div>

<div id="bw-overlay"></div>

<div id="hint">
  <div class="hint-ring"></div>
  <div class="hint-text">토큰을 카메라에 비춰주세요</div>
</div>

<div id="ar-container"></div>

<div id="ui">
  <div id="header">
    <div id="logo-icon">
      <img src="logo.png" alt="WEIV" />
    </div>
    <div id="logo-text">WEIV</div>
    <button id="info-btn">i</button>
  </div>

  <div id="bottom-controls">
    <div id="light-row">
      <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
        <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
        <line x1="2" y1="12" x2="5" y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
        <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
      </svg>
      <input type="range" id="light-slider" min="0" max="100" value="60" />
    </div>

    <div id="aux-row">
      <button class="aux-btn" id="cleanview-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
      <button class="aux-btn" id="bw-btn">
        <svg viewBox="0 0 24 24" stroke="white" stroke-width="2">
          <circle cx="12" cy="12" r="9" fill="none"/>
          <path d="M12 3a9 9 0 0 1 0 18z" fill="white" stroke="none"/>
        </svg>
      </button>
    </div>

    <div id="mode-toggle">
      <div id="toggle-bg"></div>
      <div class="toggle-icon" id="icon-default">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
      </div>
      <div class="toggle-icon" id="icon-shape">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <path d="M1 4.5V3a2 2 0 0 1 2-2h1.5"/>
          <path d="M22.5 3H21a2 2 0 0 0-2 2v1.5"/>
          <path d="M22.5 20.5H21a2 2 0 0 1-2-2V17"/>
          <path d="M1 19.5V21a2 2 0 0 0 2 2h1.5"/>
          <circle cx="12" cy="12" r="3" stroke-dasharray="2 2"/>
          <line x1="12" y1="5" x2="12" y2="7"/>
          <line x1="12" y1="17" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="7" y2="12"/>
          <line x1="17" y1="12" x2="19" y2="12"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<script>
  // MindAR 번들에서 THREE 가져오기
  const { MindARThree } = window.MINDAR.IMAGE;
  const THREE = window.THREE;

  let isShapeMode = false;
  let isCleanView = false;
  let isBW = false;
  let modelDefault = null;
  let modelShape = null;
  let targetFound = false;
  let mindarThree = null;

  const loadingEl = document.getElementById('loading');
  const loadingBar = document.getElementById('loading-bar');
  const loadingSub = document.getElementById('loading-sub');
  const startBtn = document.getElementById('start-btn');
  const hintEl = document.getElementById('hint');
  const uiEl = document.getElementById('ui');

  function setLoadingProgress(pct, text) {
    loadingBar.style.width = pct + '%';
    loadingSub.textContent = text;
  }

  // 사파리는 사용자 제스처 없이 카메라 못 켜는 경우가 있어서
  // 버튼으로 시작하는 방식 추가
  async function initAR() {
    startBtn.style.display = 'none';
    setLoadingProgress(20, '카메라 권한 요청 중...');

    try {
      // 카메라 권한 먼저 요청
      await navigator.mediaDevices.getUserMedia({ video: true });
    } catch(e) {
      setLoadingProgress(0, '카메라 권한이 필요합니다');
      startBtn.style.display = 'block';
      startBtn.textContent = '다시 시도';
      return;
    }

    setLoadingProgress(40, '3D 모델 로딩 중...');

    mindarThree = new MindARThree({
      container: document.getElementById('ar-container'),
      imageTargetSrc: './targets.mind',
      uiLoading: 'no',
      uiScanning: 'no',
      uiError: 'no',
    });

    const { renderer, scene, camera } = mindarThree;

    // 조명
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(0, 5, 5);
    scene.add(dirLight);

    // 슬라이더 → 조명 연동
    document.getElementById('light-slider').addEventListener('input', (e) => {
      const v = e.target.value / 100;
      ambientLight.intensity = v * 0.8;
      dirLight.intensity = v * 1.2;
    });

    // GLB 로더
    const loader = new THREE.GLTFLoader
      ? new THREE.GLTFLoader()
      : null;

    // MindAR 번들에 GLTFLoader 포함 여부 확인 후 동적 import
    let GLTFLoader;
    try {
      const mod = await import('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js');
      GLTFLoader = mod.GLTFLoader;
    } catch(e) {
      // fallback: THREE 내장
      GLTFLoader = THREE.GLTFLoader;
    }

    function loadGLB(src) {
      return new Promise((resolve, reject) => {
        const l = new GLTFLoader();
        l.load(src, (gltf) => {
          const model = gltf.scene;
          const box = new THREE.Box3().setFromObject(model);
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = 1.0 / maxDim;
          model.scale.setScalar(scale);
          const center = box.getCenter(new THREE.Vector3());
          model.position.sub(center.multiplyScalar(scale));
          resolve(model);
        }, undefined, reject);
      });
    }

    setLoadingProgress(60, '기본 모델 로딩 중...');
    modelDefault = await loadGLB('./elephant-default.glb');

    setLoadingProgress(80, '도형 모델 로딩 중...');
    modelShape = await loadGLB('./elephant_shape.glb');

    const anchor = mindarThree.addAnchor(0);
    anchor.group.add(modelDefault);
    anchor.group.add(modelShape);
    modelDefault.visible = true;
    modelShape.visible = false;

    anchor.onTargetFound = () => {
      targetFound = true;
      hintEl.classList.add('hidden');
    };
    anchor.onTargetLost = () => {
      targetFound = false;
      if (!isCleanView) hintEl.classList.remove('hidden');
    };

    setLoadingProgress(95, 'AR 시작 중...');
    await mindarThree.start();

    setLoadingProgress(100, '완료!');
    setTimeout(() => {
      loadingEl.classList.add('hidden');
      setTimeout(() => loadingEl.style.display = 'none', 700);
    }, 300);

    renderer.setAnimationLoop(() => {
      renderer.render(scene, camera);
    });
  }

  // 페이지 로드 시 버튼 보여주고 시작 대기
  window.addEventListener('load', () => {
    setLoadingProgress(0, '시작 버튼을 눌러주세요');
    startBtn.style.display = 'block';
    startBtn.textContent = '카메라 시작';
  });

  startBtn.addEventListener('click', initAR);

  // 모드 토글
  document.getElementById('mode-toggle').addEventListener('click', () => {
    isShapeMode = !isShapeMode;
    document.getElementById('mode-toggle').classList.toggle('shape-active', isShapeMode);
    if (modelDefault && modelShape) {
      modelDefault.visible = !isShapeMode;
      modelShape.visible = isShapeMode;
    }
  });

  // 클린뷰
  document.getElementById('cleanview-btn').addEventListener('click', () => {
    isCleanView = !isCleanView;
    if (isCleanView) {
      uiEl.classList.add('hidden');
      hintEl.classList.add('hidden');
    } else {
      uiEl.classList.remove('hidden');
      if (!targetFound) hintEl.classList.remove('hidden');
    }
  });

  // BW
  document.getElementById('bw-btn').addEventListener('click', () => {
    isBW = !isBW;
    document.getElementById('bw-overlay').classList.toggle('active', isBW);
    document.getElementById('bw-btn').classList.toggle('active', isBW);
  });

  // info
  document.getElementById('info-btn').addEventListener('click', () => {
    alert('WEIV - AR 정물 미술 교구 라이브러리\n토큰을 카메라에 비춰 3D 정물을 관찰하세요.');
  });
</script>
</body>
</html>
